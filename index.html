<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FitCoach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F7F5F2;--sur:#fff;--sur2:#F0EDE8;--bdr:#E2DDD7;--acc:#C8F04E;--dk:#1A1A1A;--t:#1A1A1A;--t2:#6B6560;--t3:#9E9790;--red:#E84545;--grn:#2ECC71;--r:12px;--rs:8px;--fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh;}
.hide{display:none!important;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.bar{background:var(--dk);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--acc);}
.logo span{color:#fff;}
.tr{display:flex;align-items:center;gap:12px;}
.vt{display:flex;background:rgba(255,255,255,0.1);border-radius:8px;overflow:hidden;}
.vt button{padding:6px 14px;font-size:13px;font-family:var(--fb);font-weight:500;border:none;background:transparent;color:rgba(255,255,255,0.6);cursor:pointer;}
.vt button.on{background:var(--acc);color:var(--dk);}
.main{display:flex;flex:1;height:calc(100vh - 60px);overflow:hidden;}
.sb{width:240px;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;flex-shrink:0;}
.sbi{padding:16px;}
.sbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;margin-bottom:2px;}
.ci:hover{background:var(--sur2);}
.ci.on{background:var(--acc);}
.ci.on .cn{color:var(--dk);font-weight:600;}
.ci.on .cg{color:rgba(26,26,26,0.6);}
.av{width:32px;height:32px;border-radius:50%;background:var(--dk);color:var(--acc);font-family:var(--fd);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cn{font-size:14px;font-weight:500;}
.cg{font-size:11px;color:var(--t3);}
.ab{width:100%;padding:10px;border:2px dashed var(--bdr);border-radius:var(--rs);background:transparent;color:var(--t3);font-family:var(--fb);font-size:13px;cursor:pointer;margin-top:4px;}
.ab:hover{border-color:var(--acc);color:var(--dk);}
.con{flex:1;overflow-y:auto;padding:24px;}
.tabs{display:flex;gap:4px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:4px;margin-bottom:24px;width:fit-content;}
.tb{padding:8px 18px;border:none;border-radius:var(--rs);background:transparent;font-family:var(--fb);font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;}
.tb.on{background:var(--dk);color:#fff;}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ct{font-family:var(--fd);font-size:20px;letter-spacing:1px;}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.sc{background:var(--sur2);border-radius:var(--r);padding:14px;text-align:center;}
.sv{font-family:var(--fd);font-size:26px;letter-spacing:1px;color:var(--dk);line-height:1;margin-bottom:4px;}
.sl{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t3);}
.sd{font-size:12px;font-weight:600;margin-top:4px;}
.sd.pos{color:var(--grn);}
.sd.neg{color:var(--red);}
.wc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.wh{background:var(--dk);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.wt{font-family:var(--fd);font-size:18px;letter-spacing:1px;color:var(--acc);}
.wm{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}
.er{display:grid;grid-template-columns:1fr 70px 70px 80px 90px;gap:8px;padding:10px 16px;border-bottom:1px solid var(--bdr);align-items:center;font-size:14px;}
.er.hdr{background:var(--sur2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--t3);padding:8px 16px;}
.en{font-weight:500;}
.li{width:100%;padding:4px 8px;border:1px solid var(--bdr);border-radius:6px;font-family:var(--fb);font-size:13px;background:var(--bg);text-align:center;}
.li:focus{outline:none;border-color:var(--acc);}
.li.ok{background:rgba(200,240,78,0.15);border-color:var(--acc);}
.btn{padding:10px 20px;border-radius:var(--rs);border:none;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.bp{background:var(--acc);color:var(--dk);}
.bp:hover{background:#b8e030;}
.bd{background:var(--dk);color:#fff;}
.bg{background:transparent;color:var(--t2);border:1px solid var(--bdr);}
.bg:hover{background:var(--sur2);}
.bs{padding:6px 12px;font-size:12px;}
.dr{color:var(--red);}
.fg{margin-bottom:14px;}
.fl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--t2);margin-bottom:6px;display:block;}
.fi{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:var(--fb);font-size:14px;background:var(--sur);color:var(--t);}
.fi:focus{outline:none;border-color:var(--dk);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.mo{background:var(--sur);border-radius:var(--r);padding:28px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.mt{font-family:var(--fd);font-size:24px;letter-spacing:1px;margin-bottom:20px;}
.mf{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.tag{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;}
.tg{background:rgba(46,204,113,0.15);color:var(--grn);}
.ty{background:rgba(200,240,78,0.3);color:#7a9000;}
.emp{text-align:center;padding:48px 24px;color:var(--t3);}
.ei{font-size:40px;margin-bottom:12px;}
.et{font-family:var(--fd);font-size:22px;letter-spacing:1px;color:var(--t2);margin-bottom:6px;}
.es{font-size:14px;}
.hero{background:var(--dk);border-radius:var(--r);padding:24px;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.ha{width:60px;height:60px;border-radius:50%;background:var(--acc);color:var(--dk);font-family:var(--fd);font-size:26px;display:flex;align-items:center;justify-content:center;}
.hn{font-family:var(--fd);font-size:32px;letter-spacing:2px;color:var(--acc);}
.hs{font-size:13px;color:rgba(255,255,255,0.6);margin-top:2px;}
.st{font-family:var(--fd);font-size:22px;letter-spacing:1px;margin-bottom:16px;}
.dv{height:1px;background:var(--bdr);margin:20px 0;}
.eg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.nc{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t3);padding:48px;}
.ni{font-size:56px;opacity:0.4;}
.nt{font-family:var(--fd);font-size:28px;letter-spacing:2px;color:var(--t2);}
.ebr{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 36px;gap:8px;align-items:center;margin-bottom:8px;}
.lb{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 12px;margin-top:6px;}
.lt{font-size:12px;color:var(--t2);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
.lc{background:var(--sur);border-radius:var(--r);padding:40px;width:100%;max-width:400px;text-align:center;}
.ll{font-family:var(--fd);font-size:36px;letter-spacing:3px;color:var(--dk);}
.ll span{color:var(--acc);}
.ld{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:24px;letter-spacing:2px;color:var(--t3);}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px;}
@media(max-width:768px){.sb{width:190px;}.er{grid-template-columns:1fr 55px 55px 65px 75px;font-size:12px;}.sg{grid-template-columns:1fr 1fr;}.eg{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="app"><div class="ld">FITCOACH</div></div>
<script>
var SB_URL="https://lvscijejongxoklwdbko.supabase.co";
var SB_KEY="sb_publishable_KK-9Sj1ktTcTPQ3VNl_FRQ_-Mriqax-";
var sb=supabase.createClient(SB_URL,SB_KEY);
var params=new URLSearchParams(location.search);
var CT=params.get("client");
var S={view:"trainer",sel:null,tab:"workouts",modal:null};
var DB={clients:[],workouts:{},logs:{},evolt:{}};
function tok(n){return"tok_"+n.toLowerCase().replace(/\s+/g,"").slice(0,8)+Math.random().toString(36).slice(2,6);}
function ini(n){return((n||"?").split(" ").map(function(x){return x[0];}).join("")).slice(0,2).toUpperCase();}
function td(){return new Date().toISOString().slice(0,10);}
function loadAll(){
  return Promise.all([sb.from("clients").select("*").order("created_at"),sb.from("workouts").select("*").order("created_at"),sb.from("logs").select("*").order("date"),sb.from("evolt").select("*").order("date")]).then(function(res){
    DB.clients=res[0].data||[];
    DB.workouts={};(res[1].data||[]).forEach(function(x){if(!DB.workouts[x.client_id])DB.workouts[x.client_id]=[];DB.workouts[x.client_id].push(x);});
    DB.logs={};(res[2].data||[]).forEach(function(x){if(!DB.logs[x.client_id])DB.logs[x.client_id]={};if(!DB.logs[x.client_id][x.workout_id])DB.logs[x.client_id][x.workout_id]=[];DB.logs[x.client_id][x.workout_id].push(x);});
    DB.evolt={};(res[3].data||[]).forEach(function(x){if(!DB.evolt[x.client_id])DB.evolt[x.client_id]=[];DB.evolt[x.client_id].push(x);});
  });
}
function render(){
  var app=document.getElementById("app");
  if(CT){var cl=DB.clients.find(function(c){return c.token===CT;});if(!cl){app.innerHTML='<div class="ls"><div class="lc"><div class="ll">FIT<span>COACH<\/span><\/div><p style="color:var(--t3);margin:12px 0 20px;">Your personal training portal<\/p><p style="color:var(--red);font-size:14px;">This link is invalid or expired. Contact your trainer.<\/p><\/div><\/div>';return;}app.innerHTML=clientApp(cl);}
  else{app.innerHTML=trainerApp();}
}
function trainerApp(){
  var cl=DB.clients.find(function(c){return c.id===S.sel;});
  var sb2='<div class="sb"><div class="sbi"><div class="sbl">Clients ('+DB.clients.length+')<\/div>';
  DB.clients.forEach(function(c){sb2+='<div class="ci'+(c.id===S.sel?' on':'')+'" onclick="selC(\''+c.id+'\')"><div class="av">'+ini(c.name)+'<\/div><div><div class="cn">'+c.name+'<\/div><div class="cg">'+c.goal+'<\/div><\/div><\/div>';});
  sb2+='<button class="ab" onclick="openM(\'addClient\')">+ Add Client<\/button><\/div><\/div>';
  return '<div class="app"><div class="bar"><div class="logo">FIT<span>COACH<\/span><\/div><div class="tr"><div class="vt"><button class="'+(S.view==="trainer"?"on":"")+'" onclick="setV(\'trainer\')">Trainer<\/button><button class="'+(S.view==="preview"?"on":"")+'" onclick="setV(\'preview\')">Preview<\/button><\/div><button onclick="expD()" style="padding:6px 14px;font-size:13px;font-family:var(--fb);font-weight:600;border:none;background:rgba(200,240,78,0.15);color:var(--acc);border-radius:8px;cursor:pointer;">&#8595; Export<\/button><\/div><\/div><div class="main">'+sb2+(cl?cDetail(cl,true):'<div class="nc"><div class="ni">&#128072;<\/div><div class="nt">Select a Client<\/div><\/div>')+'<\/div>'+(S.modal?rModal():'')+' <\/div>';
}
function clientApp(cl){return '<div class="app"><div class="bar"><div class="logo">FIT<span>COACH<\/span><\/div><\/div><div class="main">'+cDetail(cl,false)+'<\/div>'+(S.modal?rModal():'')+' <\/div>';}
function cDetail(cl,isTr){
  var tabs=isTr?["workouts","evolt","progress","access"]:["workouts","evolt","progress"];
  var labels={workouts:"Workouts",evolt:"EVOLT",progress:"Progress",access:"Client Link"};
  var logs=DB.logs[cl.id]||{};
  var total=Object.values(logs).reduce(function(a,v){return a+v.length;},0);
  var tbHtml='<div class="tabs">';
  tabs.forEach(function(t){tbHtml+='<button class="tb'+(S.tab===t?' on':'')+'" onclick="setT(\''+t+'\')">'+labels[t]+'<\/button>';});
  tbHtml+='<\/div>';
  return '<div class="con"><div class="hero"><div class="ha">'+ini(cl.name)+'<\/div><div style="flex:1"><div class="hn">'+cl.name+'<\/div><div class="hs">'+cl.goal+' &middot; '+cl.email+' &middot; '+total+' sessions logged<\/div><\/div>'+(isTr?'<button class="btn bp bs" onclick="openM(\'addWorkout\',\''+cl.id+'\')">+ Workout<\/button>':'')+'<\/div>'+tbHtml+rTab(cl,isTr)+'<\/div>';
}
function rTab(cl,isTr){
  var ww=DB.workouts[cl.id]||[];
  var logs=DB.logs[cl.id]||{};
  var evolt=DB.evolt[cl.id]||[];
  if(S.tab==="workouts"){
    if(!ww.length){return '<div class="emp"><div class="ei">&#127947;<\/div><div class="et">No Workouts Yet<\/div><div class="es">'+(isTr?'Build the first workout plan.':'Your trainer has not added workouts yet.')+'<\/div>'+(isTr?'<br><button class="btn bp" style="margin-top:16px" onclick="openM(\'addWorkout\',\''+cl.id+'\')">+ Create Workout<\/button>':'')+'<\/div>';}
    return ww.map(function(w){return wCard(w,logs,cl.id,isTr);}).join('');
  }
  if(S.tab==="evolt"){return '<div class="card">'+ePanel(cl.id,evolt)+'<\/div>';}
  if(S.tab==="progress"){
    var ents=Object.entries(logs);
    if(!ents.length)return '<div class="emp"><div class="ei">&#128197;<\/div><div class="et">No Sessions Logged<\/div><div class="es">Completed workouts will appear here.<\/div><\/div>';
    return ents.map(function(pair){
      var wid=pair[0],wlogs=pair[1];
      var w=ww.find(function(x){return x.id===wid;});
      if(!w||!wlogs.length)return '';
      var rows=wlogs.slice().reverse().map(function(entry,i){
        var tags=Object.entries(entry.data||{}).filter(function(p){return p[0].endsWith('_a');}).map(function(p){var idx=parseInt(p[0]);return '<span class="tag ty">'+(w.exercises[idx]?w.exercises[idx].name:'?')+': '+p[1]+'<\/span>';}).join('');
        return '<div style="padding-bottom:10px;margin-bottom:10px;'+(i<wlogs.length-1?'border-bottom:1px solid var(--bdr)':'')+'"><div style="font-size:12px;color:var(--t3);margin-bottom:6px;">&#128197; '+entry.date+'<\/div><div style="display:flex;flex-wrap:wrap;gap:8px;">'+tags+'<\/div><\/div>';
      }).join('');
      return '<div class="card"><div class="ct" style="margin-bottom:12px">'+w.name+'<\/div>'+rows+'<\/div>';
    }).join('');
  }
  if(S.tab==="access"&&isTr){
    var link=location.origin+location.pathname+'?client='+cl.token;
    return '<div class="card"><div class="st">&#128279; Client Access Link<\/div><p style="font-size:14px;color:var(--t2);margin-bottom:16px;line-height:1.6;">Send this link to <strong>'+cl.name+'<\/strong>. They will see only their own data from any device.<\/p><div class="lb"><span class="lt">'+link+'<\/span><button class="btn bp bs" onclick="cpLink(\''+link+'\')">Copy Link<\/button><\/div><p style="font-size:12px;color:var(--t3);margin-top:12px;">Data is stored in the cloud and works on any device.<\/p><\/div>';
  }
  return '';
}
function wCard(w,logs,cid,isTr){
  var tl=(logs[w.id]||[]).find(function(l){return l.date===td();});
  var pl=(logs[w.id]||[]).filter(function(l){return l.date!==td();}).slice(-3).reverse();
  var exes=(w.exercises||[]).map(function(ex,i){
    var act=isTr?'<span style="text-align:center;color:var(--t3);font-size:12px">-<\/span>':'<input class="li'+(tl&&tl.data&&tl.data[i+"_a"]?' ok':'')+'" data-wid="'+w.id+'" data-idx="'+i+'" placeholder="lbs x reps" value="'+(tl&&tl.data&&tl.data[i+"_a"]?tl.data[i+"_a"]:'')+'">';
    return '<div class="er"><span class="en">'+ex.name+'<\/span><span style="text-align:center;color:var(--t2)">'+ex.sets+'<\/span><span style="text-align:center;color:var(--t2)">'+ex.reps+'<\/span><span style="text-align:center;color:var(--t2)">'+ex.weight+'<\/span>'+act+'<\/div>';
  }).join('');
  var past='';
  if(pl.length){
    var pr=pl.map(function(l){var v=Object.entries(l.data||{}).filter(function(p){return p[0].endsWith('_a');}).map(function(p){var i=parseInt(p[0]);return(w.exercises[i]?w.exercises[i].name:'?')+': '+p[1];}).join(' · ');return '<div style="font-size:12px;color:var(--t2);margin-bottom:4px"><strong>'+l.date+':<\/strong> '+v+'<\/div>';}).join('');
    past='<div style="padding:12px 16px;background:var(--bg);border-top:1px solid var(--bdr)"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:8px">Recent Sessions<\/div>'+pr+'<\/div>';
  }
  var btns=isTr?'<button class="btn bg bs" onclick="openM(\'editWorkout\',\''+cid+'\',\''+w.id+'\')">Edit<\/button><button class="btn bg bs dr" onclick="delW(\''+w.id+'\',\''+cid+'\')">Delete<\/button>':'<button class="btn bp bs" onclick="logS(\''+cid+'\',\''+w.id+'\')">Log Session<\/button>';
  return '<div class="wc"><div class="wh"><div><div class="wt">'+w.name+'<\/div><div class="wm">'+(w.day||'')+' &middot; '+(w.exercises||[]).length+' exercises<\/div><\/div><div style="display:flex;gap:8px;align-items:center;"><span id="sv'+w.id+'" class="tag tg hide">&#10003; Saved<\/span>'+btns+'<\/div><\/div><div class="er hdr"><span>Exercise<\/span><span>Sets<\/span><span>Reps<\/span><span>Target<\/span><span>Actual<\/span><\/div>'+exes+past+'<\/div>';
}
function ePanel(cid,entries){
  var latest=entries[entries.length-1],prev=entries[entries.length-2];
  var fields=[{k:"body_fat",l:"Body Fat",u:"%"},{k:"muscle_mass",l:"Muscle Mass",u:"lbs"},{k:"bmi",l:"BMI",u:""},{k:"hydration",l:"Hydration",u:"%"},{k:"visceral_fat",l:"Visceral Fat",u:""},{k:"weight",l:"Weight",u:"lbs"}];
  function dlt(k){if(!latest||!prev||!latest[k]||!prev[k])return null;return parseFloat(latest[k])-parseFloat(prev[k]);}
  function gd(k){return k==="body_fat"||k==="visceral_fat";}
  function spk(arr,col){
    if(arr.length<2)return '<div style="height:70px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px">Not enough data<\/div>';
    var W=300,H=70,mn=Math.min.apply(null,arr),mx=Math.max.apply(null,arr),rng=mx-mn||1;
    var pts=arr.map(function(v,i){return(i/(arr.length-1))*W+","+(H-((v-mn)/rng)*(H-10)-5);}).join(" ");
    var dots=arr.map(function(v,i){var x=(i/(arr.length-1))*W,y=H-((v-mn)/rng)*(H-10)-5;return '<circle cx="'+x+'" cy="'+y+'" r="3" fill="'+col+'"/>';}).join("");
    return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="width:100%;height:70px;overflow:visible"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'<\/svg>';
  }
  var html='<div class="ch"><div class="st">EVOLT Data<\/div><button class="btn bd bs" onclick="openM(\'addEvolt\',\''+cid+'\')">+ Add Scan<\/button><\/div>';
  if(latest){
    html+='<div class="sg">';
    fields.forEach(function(f){var dv=dlt(f.k);var cls=dv===null?'':(gd(f.k)?(dv<0?'pos':'neg'):(dv>0?'pos':'neg'));html+='<div class="sc"><div class="sv">'+(latest[f.k]||'-')+'<span style="font-size:13px">'+f.u+'<\/span><\/div><div class="sl">'+f.l+'<\/div>'+(dv!==null?'<div class="sd '+cls+'">'+(dv>0?'&#9650;':'&#9660;')+' '+Math.abs(dv).toFixed(1)+f.u+'<\/div>':'')+'<\/div>';});
    html+='<\/div>';
  }
  if(entries.length>1){html+='<div class="card" style="margin-top:16px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--t2);margin-bottom:8px">Body Fat % Trend<\/div>'+spk(entries.map(function(e){return parseFloat(e.body_fat);}).filter(Boolean),"#C8F04E")+'<div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--t2);margin:12px 0 8px">Muscle Mass Trend<\/div>'+spk(entries.map(function(e){return parseFloat(e.muscle_mass);}).filter(Boolean),"#1A1A1A")+'<\/div>';}
  if(!entries.length)html+='<div class="emp"><div class="ei">&#128202;<\/div><div class="et">No Scans Yet<\/div><div class="es">Add the first EVOLT scan to start tracking.<\/div><\/div>';
  if(entries.length){
    html+='<div class="card" style="margin-top:16px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;color:var(--t2);margin-bottom:12px">Scan History<\/div>';
    entries.slice().reverse().forEach(function(e,i){
      html+='<div style="padding:10px 0;'+(i<entries.length-1?'border-bottom:1px solid var(--bdr)':'')+'font-size:13px"><div style="font-weight:600;color:var(--t2);margin-bottom:4px">'+e.date+'<\/div><div style="display:flex;flex-wrap:wrap;gap:12px">';
      fields.forEach(function(f){if(e[f.k])html+='<span><span style="color:var(--t3)">'+f.l+': <\/span>'+e[f.k]+f.u+'<\/span>';});
      html+='<\/div><\/div>';
    });
    html+='<\/div>';
  }
  return html;
}
function rModal(){var m=S.modal;if(m.type==="addClient")return aCModal();if(m.type==="addWorkout"||m.type==="editWorkout")return wBModal(m);if(m.type==="addEvolt")return eModal(m.cid);return '';}
function aCModal(){var goals=["General Fitness","Muscle Gain","Weight Loss","Athletic Performance","Mobility","Endurance"];return '<div class="ov" onclick="closeM()"><div class="mo" onclick="event.stopPropagation()"><div class="mt">Add New Client<\/div><div class="fg"><label class="fl">Full Name<\/label><input class="fi" id="mn" placeholder="Jane Smith"><\/div><div class="fg"><label class="fl">Email<\/label><input class="fi" id="me" type="email" placeholder="jane@email.com"><\/div><div class="fg"><label class="fl">Goal<\/label><select class="fi" id="mg">'+["General Fitness","Muscle Gain","Weight Loss","Athletic Performance","Mobility","Endurance"].map(function(g){return '<option>'+g+'<\/option>';}).join('')+'<\/select><\/div><div class="mf"><button class="btn bg" onclick="closeM()">Cancel<\/button><button class="btn bp" onclick="doAC()">Add Client<\/button><\/div><\/div><\/div>';}
function wBModal(m){var ex=m.type==="editWorkout"?(DB.workouts[m.cid]||[]).find(function(w){return w.id===m.wid;}):null;var exes=ex&&ex.exercises?ex.exercises:[{name:'',sets:'',reps:'',weight:'',rest:''}];return '<div class="ov" onclick="closeM()"><div class="mo" style="max-width:700px" onclick="event.stopPropagation()"><div class="mt">'+(ex?'Edit Workout':'New Workout')+'<\/div><div class="fr"><div class="fg"><label class="fl">Workout Name<\/label><input class="fi" id="wn" placeholder="Upper Body A" value="'+(ex?ex.name||'':'')+'"><\/div><div class="fg"><label class="fl">Day / Label<\/label><input class="fi" id="wd" placeholder="Monday" value="'+(ex?ex.day||'':'')+'"><\/div><\/div><div class="dv"><\/div><div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 36px;gap:8px;margin-bottom:6px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)">Exercise<\/div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)">Sets<\/div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)">Reps<\/div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)">Weight<\/div><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)">Rest(s)<\/div><div><\/div><\/div><div id="exl">'+exes.map(function(e,i){return exR(e,i);}).join('')+'<\/div><button class="btn bg bs" style="margin-top:8px" onclick="addExR()">+ Add Exercise<\/button><div class="mf"><button class="btn bg" onclick="closeM()">Cancel<\/button><button class="btn bp" onclick="doSW(\''+m.cid+'\',\''+( ex?ex.id||'':'')+'\')">Save Workout<\/button><\/div><\/div><\/div>';}
function exR(ex,i){return '<div class="ebr" id="ex'+i+'"><input class="fi" placeholder="Exercise name" value="'+(ex.name||'')+'" data-f="name"><input class="fi" placeholder="4" style="text-align:center" value="'+(ex.sets||'')+'" data-f="sets"><input class="fi" placeholder="10" style="text-align:center" value="'+(ex.reps||'')+'" data-f="reps"><input class="fi" placeholder="lbs" style="text-align:center" value="'+(ex.weight||'')+'" data-f="weight"><input class="fi" placeholder="60" style="text-align:center" value="'+(ex.rest||'')+'" data-f="rest"><button onclick="remExR('+i+')" style="width:32px;height:32px;border:none;background:var(--sur2);border-radius:6px;cursor:pointer;color:var(--red);font-weight:700;font-size:16px">x<\/button><\/div>';}
function eModal(cid){var fields=[{k:"body_fat",l:"Body Fat",u:"%"},{k:"muscle_mass",l:"Muscle Mass",u:"lbs"},{k:"bmi",l:"BMI",u:""},{k:"hydration",l:"Hydration",u:"%"},{k:"visceral_fat",l:"Visceral Fat",u:""},{k:"weight",l:"Weight",u:"lbs"}];return '<div class="ov" onclick="closeM()"><div class="mo" onclick="event.stopPropagation()"><div class="mt">Add EVOLT Scan<\/div><div class="fg"><label class="fl">Scan Date<\/label><input type="date" class="fi" id="ev_date" value="'+td()+'"><\/div><div class="eg">'+fields.map(function(f){return '<div class="fg"><label class="fl">'+f.l+(f.u?' ('+f.u+')':'')+'<\/label><input type="number" step="0.1" class="fi" id="ev_'+f.k+'" placeholder="0.0"><\/div>';}).join('')+'<\/div><div class="mf"><button class="btn bg" onclick="closeM()">Cancel<\/button><button class="btn bp" onclick="doSE(\''+cid+'\')">Save Scan<\/button><\/div><\/div><\/div>';}
function setV(v){S.view=v;render();}
function setT(t){S.tab=t;render();}
function selC(id){S.sel=id;S.tab="workouts";render();}
function openM(type,cid,wid){S.modal={type:type,cid:cid,wid:wid};render();}
function closeM(){S.modal=null;render();}
function doAC(){var name=document.getElementById("mn").value.trim();if(!name)return;sb.from("clients").insert({name:name,email:document.getElementById("me").value,goal:document.getElementById("mg").value,token:tok(name)}).select().single().then(function(r){if(r.error){alert(r.error.message);return;}DB.clients.push(r.data);S.sel=r.data.id;closeM();});}
function logS(cid,wid){var data={};document.querySelectorAll('input[data-wid="'+wid+'"]').forEach(function(el){if(el.value)data[el.dataset.idx+"_a"]=el.value;});var tday=td();var existing=(DB.logs[cid]&&DB.logs[cid][wid]||[]).find(function(l){return l.date===tday;});var p=existing?sb.from("logs").update({data:data}).eq("id",existing.id).then(function(){existing.data=data;}):sb.from("logs").insert({client_id:cid,workout_id:wid,date:tday,data:data}).select().single().then(function(r){if(!DB.logs[cid])DB.logs[cid]={};if(!DB.logs[cid][wid])DB.logs[cid][wid]=[];if(r.data)DB.logs[cid][wid].push(r.data);});p.then(function(){var b=document.getElementById("sv"+wid);if(b){b.classList.remove("hide");setTimeout(function(){b.classList.add("hide");},2500);}});}
function doSW(cid,eid){var name=document.getElementById("wn").value.trim();if(!name)return;var exercises=Array.from(document.querySelectorAll("#exl .ebr")).map(function(r){return{name:r.querySelector("[data-f=name]").value,sets:r.querySelector("[data-f=sets]").value,reps:r.querySelector("[data-f=reps]").value,weight:r.querySelector("[data-f=weight]").value,rest:r.querySelector("[data-f=rest]").value};}).filter(function(e){return e.name.trim();});var day=document.getElementById("wd").value;var p=eid?sb.from("workouts").update({name:name,day:day,exercises:exercises}).eq("id",eid).select().single().then(function(r){if(r.data)DB.workouts[cid]=DB.workouts[cid].map(function(w){return w.id===eid?r.data:w;}); }):sb.from("workouts").insert({client_id:cid,name:name,day:day,exercises:exercises}).select().single().then(function(r){if(!DB.workouts[cid])DB.workouts[cid]=[];if(r.data)DB.workouts[cid].push(r.data);});p.then(function(){closeM();});}
function delW(id,cid){if(!confirm("Delete this workout?"))return;sb.from("workouts").delete().eq("id",id).then(function(){DB.workouts[cid]=(DB.workouts[cid]||[]).filter(function(w){return w.id!==id;});render();});}
function addExR(){var list=document.getElementById("exl");list.insertAdjacentHTML("beforeend",exR({},list.children.length));}
function remExR(i){var el=document.getElementById("ex"+i);if(el)el.remove();}
function doSE(cid){var fields=["body_fat","muscle_mass","bmi","hydration","visceral_fat","weight"];var entry={date:document.getElementById("ev_date").value,client_id:cid};fields.forEach(function(f){var el=document.getElementById("ev_"+f);if(el&&el.value)entry[f]=parseFloat(el.value);});sb.from("evolt").insert(entry).select().single().then(function(r){if(r.error){alert(r.error.message);return;}if(!DB.evolt[cid])DB.evolt[cid]=[];if(r.data)DB.evolt[cid].push(r.data);closeM();});}
function cpLink(link){navigator.clipboard.writeText(link).then(function(){var btn=document.querySelector(".lb .btn");if(btn){var orig=btn.textContent;btn.textContent="Copied!";setTimeout(function(){btn.textContent=orig;},2000);}});}
function expD(){var blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="fitcoach-"+td()+".json";a.click();URL.revokeObjectURL(url);}
loadAll().then(function(){render();});
</script>
